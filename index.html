<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eduardo Matos &mdash; Portfólio</title>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface2: #21262d;
        --border: #30363d;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --accent: #58a6ff;
        --accent-hover: #79c0ff;
        --green: #3fb950;
        --yellow: #d29922;
        --purple: #bc8cff;
        --orange: #ffa657;
        --radius: 12px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
          Helvetica, Arial, sans-serif;
        min-height: 100vh;
      }

      /* ── HEADER ─────────────────────────────────────────── */
      header {
        max-width: 1100px;
        margin: 0 auto;
        padding: 80px 24px 40px;
        display: flex;
        align-items: center;
        gap: 32px;
        flex-wrap: wrap;
      }

      .avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        border: 3px solid var(--border);
        object-fit: cover;
        flex-shrink: 0;
      }

      .header-info h1 {
        font-size: 2rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .header-info p {
        margin-top: 6px;
        color: var(--text-muted);
        font-size: 1rem;
      }

      .github-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 12px;
        color: var(--accent);
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.2s;
      }

      .github-link:hover {
        color: var(--accent-hover);
      }

      /* ── FILTERS ─────────────────────────────────────────── */
      .filters-wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 24px 32px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .filter-label {
        color: var(--text-muted);
        font-size: 0.85rem;
        margin-right: 4px;
      }

      .filter-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 5px 14px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.82rem;
        transition: all 0.2s;
      }

      .filter-btn.active,
      .filter-btn:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg);
        font-weight: 600;
      }

      /* ── GRID ────────────────────────────────────────────── */
      .grid {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 24px 80px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
      }

      /* ── CARD ────────────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
        text-decoration: none;
        color: inherit;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(88, 166, 255, 0.05),
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }

      .card:hover {
        border-color: var(--accent);
        transform: translateY(-4px);
        box-shadow: 0 8px 32px rgba(88, 166, 255, 0.15);
      }

      .card:hover::before {
        opacity: 1;
      }

      .card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }

      .card-name {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--accent);
        word-break: break-word;
      }

      .card-name svg {
        display: inline-block;
        vertical-align: middle;
        margin-right: 6px;
        flex-shrink: 0;
      }

      .card-fork-badge {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 12px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .card-top-right {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      .card-demo-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: var(--green);
        border: 1px solid var(--green);
        color: #0b1120;
        font-size: 0.72rem;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 12px;
        white-space: nowrap;
        cursor: pointer;
        transition: filter 0.2s, transform 0.15s;
        user-select: none;
      }

      .card-demo-btn:hover,
      .card-demo-btn:focus-visible {
        filter: brightness(1.1);
        transform: translateY(-1px);
        outline: none;
      }

      .card-demo-btn svg { display: block; }

      .card-demo-btn.local {
        background: var(--accent);
        border-color: var(--accent);
      }

      .card-desc {
        color: var(--text-muted);
        font-size: 0.875rem;
        line-height: 1.55;
        flex: 1;
        min-height: 40px;
      }

      .card-footer {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: auto;
      }

      .lang-dot {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .lang-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .stat {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .updated {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-left: auto;
      }

      /* ── SKELETON ────────────────────────────────────────── */
      @keyframes shimmer {
        0% { background-position: -800px 0; }
        100% { background-position: 800px 0; }
      }

      .skeleton {
        background: linear-gradient(
          90deg,
          var(--surface) 25%,
          var(--surface2) 50%,
          var(--surface) 75%
        );
        background-size: 800px 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 6px;
      }

      .card.loading .card-name,
      .card.loading .card-desc,
      .card.loading .lang-label,
      .card.loading .stat {
        color: transparent;
      }

      .card.loading .lang-dot {
        background: var(--surface2) !important;
      }

      /* ── ERROR ───────────────────────────────────────────── */
      .error-msg {
        grid-column: 1 / -1;
        text-align: center;
        color: var(--text-muted);
        padding: 60px 0;
        font-size: 0.95rem;
      }

      .error-msg strong {
        display: block;
        font-size: 1.2rem;
        color: var(--text);
        margin-bottom: 8px;
      }

      /* ── FOOTER ──────────────────────────────────────────── */
      footer {
        border-top: 1px solid var(--border);
        text-align: center;
        padding: 24px;
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      footer a {
        color: var(--accent);
        text-decoration: none;
      }

      /* ── RESPONSIVE ──────────────────────────────────────── */
      @media (max-width: 600px) {
        header {
          padding: 48px 16px 32px;
        }

        .grid {
          padding: 0 16px 60px;
          grid-template-columns: 1fr;
        }

        .filters-wrap {
          padding: 0 16px 24px;
        }
      }
    </style>
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <img
        id="avatar"
        class="avatar"
        src="https://avatars.githubusercontent.com/u/272224258?v=4"
        alt="Eduardo Matos"
      />
      <div class="header-info">
        <h1>Eduardo Matos</h1>
        <p id="bio">Desenvolvedor de Software</p>
        <a
          href="https://github.com/edumatosr6-svg"
          target="_blank"
          rel="noopener"
          class="github-link"
        >
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
          </svg>
          edumatosr6-svg
        </a>
      </div>
    </header>

    <!-- FILTERS -->
    <div class="filters-wrap">
      <span class="filter-label">Filtrar por linguagem:</span>
      <button class="filter-btn active" data-lang="all">Todos</button>
    </div>

    <!-- GRID -->
    <main class="grid" id="grid"></main>

    <!-- FOOTER -->
    <footer>
      Feito com GitHub API &bull; Atualizado automaticamente &bull;
      <a href="https://github.com/edumatosr6-svg" target="_blank" rel="noopener"
        >github.com/edumatosr6-svg</a
      >
    </footer>

    <script>
      const GITHUB_USER = "edumatosr6-svg";

      // Override map: repo name (lowercase) → live demo URL.
      // Used when the repo doesn't have a "homepage" field set in its GitHub settings.
      const DEMO_URLS = {
        biomed2: "https://biomed-chi.vercel.app",
        cardapio: "./cardapio/",
        pokemon: "./pokemon/pokemon/frontend/",
      };

      // Projects to always show even if not in GitHub API
      const LOCAL_PROJECTS = [
        {
          name: "cardapio",
          description: "Cardápio digital interativo com interface moderna.",
          language: "HTML",
          fork: false,
          archived: false,
          html_url: "https://github.com/edumatosr6-svg/cardapio",
          stargazers_count: 0,
          forks_count: 0,
          pushed_at: new Date().toISOString(),
        },
        {
          name: "pokemon",
          description: "Pokédex web com busca e visualização de Pokémons.",
          language: "HTML",
          fork: false,
          archived: false,
          html_url: "https://github.com/edumatosr6-svg/pokemon",
          stargazers_count: 0,
          forks_count: 0,
          pushed_at: new Date().toISOString(),
        },
      ];

      function demoUrlFor(repo) {
        const fromMap = DEMO_URLS[repo.name.toLowerCase()];
        if (fromMap) return fromMap;
        const hp = (repo.homepage || "").trim();
        if (hp && /^https?:\/\//i.test(hp)) return hp;
        return null;
      }

      // Language colors (GitHub colors)
      const LANG_COLORS = {
        TypeScript: "#3178c6",
        JavaScript: "#f1e05a",
        Python: "#3572A5",
        HTML: "#e34c26",
        CSS: "#563d7c",
        Java: "#b07219",
        "C#": "#178600",
        "C++": "#f34b7d",
        C: "#555555",
        Go: "#00ADD8",
        Rust: "#dea584",
        PHP: "#4F5D95",
        Ruby: "#701516",
        Swift: "#F05138",
        Kotlin: "#A97BFF",
        Dart: "#00B4AB",
        Shell: "#89e051",
        Vue: "#41b883",
        Svelte: "#ff3e00",
      };

      function langColor(lang) {
        return LANG_COLORS[lang] || "#8b949e";
      }

      function relativeTime(dateStr) {
        const diff = Date.now() - new Date(dateStr).getTime();
        const mins = Math.floor(diff / 60000);
        const hours = Math.floor(mins / 60);
        const days = Math.floor(hours / 24);
        const months = Math.floor(days / 30);
        const years = Math.floor(days / 365);
        if (years > 0) return `há ${years} ano${years > 1 ? "s" : ""}`;
        if (months > 0) return `há ${months} mes${months > 1 ? "es" : ""}`;
        if (days > 0) return `há ${days} dia${days > 1 ? "s" : ""}`;
        if (hours > 0) return `há ${hours}h`;
        return `há ${mins}min`;
      }

      function buildCard(repo) {
        const a = document.createElement("a");
        a.className = "card";
        a.href = repo.html_url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.dataset.lang = repo.language || "Other";

        const desc =
          repo.description ||
          "<em>Sem descrição. Acesse o repositório para saber mais.</em>";

        const demoUrl = demoUrlFor(repo);
        const isLocal = demoUrl && demoUrl.startsWith("./");
        const demoBtn = demoUrl
          ? `<span class="card-demo-btn${isLocal ? " local" : ""}" data-demo="${demoUrl}" role="button" tabindex="0" title="${isLocal ? "Abrir projeto" : "Abrir demo ao vivo"}">
               ${isLocal
                 ? `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M1.75 1A1.75 1.75 0 000 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0016 13.25v-8.5A1.75 1.75 0 0014.25 3H7.5L5.989 1.338A1.75 1.75 0 004.773 1H1.75z"/></svg>`
                 : `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M3.75 2h3.5a.75.75 0 010 1.5h-3.5a.25.25 0 00-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25v-3.5a.75.75 0 011.5 0v3.5A1.75 1.75 0 0112.25 14h-8.5A1.75 1.75 0 012 12.25v-8.5C2 2.784 2.784 2 3.75 2zm6.854-1h4.146a.25.25 0 01.25.25v4.146a.25.25 0 01-.427.177L13.03 4.03 9.28 7.78a.75.75 0 01-1.06-1.06l3.75-3.75-1.543-1.543A.25.25 0 0110.604 1z"/></svg>`
               }
               ${isLocal ? "Abrir" : "Ver demo"}
             </span>`
          : "";

        a.innerHTML = `
          <div class="card-top">
            <span class="card-name">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="var(--text-muted)">
                <path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/>
              </svg>
              ${repo.name}
            </span>
            <span class="card-top-right">
              ${demoBtn}
              ${repo.fork ? '<span class="card-fork-badge">fork</span>' : ""}
            </span>
          </div>
          <p class="card-desc">${desc}</p>
          <div class="card-footer">
            ${
              repo.language
                ? `<span class="lang-label">
                    <span class="lang-dot" style="background:${langColor(repo.language)}"></span>
                    ${repo.language}
                   </span>`
                : ""
            }
            ${
              repo.stargazers_count > 0
                ? `<span class="stat">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                      <path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/>
                    </svg>
                    ${repo.stargazers_count}
                   </span>`
                : ""
            }
            ${
              repo.forks_count > 0
                ? `<span class="stat">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                      <path d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/>
                    </svg>
                    ${repo.forks_count}
                   </span>`
                : ""
            }
            <span class="updated">${relativeTime(repo.pushed_at)}</span>
          </div>
        `;
        return a;
      }

      function buildSkeleton() {
        const a = document.createElement("a");
        a.className = "card loading";
        a.innerHTML = `
          <div class="card-top">
            <span class="card-name skeleton" style="width:60%;height:18px;display:block"></span>
          </div>
          <p class="card-desc skeleton" style="height:40px"></p>
          <div class="card-footer">
            <span class="lang-label skeleton" style="width:80px;height:14px"></span>
          </div>
        `;
        return a;
      }

      let allRepos = [];

      function renderGrid(lang) {
        const grid = document.getElementById("grid");
        const filtered =
          lang === "all" ? allRepos : allRepos.filter((r) => r.language === lang);
        grid.innerHTML = "";
        if (filtered.length === 0) {
          grid.innerHTML = `<div class="error-msg"><strong>Nenhum projeto encontrado</strong>com a linguagem selecionada.</div>`;
          return;
        }
        filtered.forEach((repo) => grid.appendChild(buildCard(repo)));
      }

      async function loadRepos() {
        const grid = document.getElementById("grid");

        // Show skeletons
        for (let i = 0; i < 6; i++) grid.appendChild(buildSkeleton());

        try {
          const res = await fetch(
            `https://api.github.com/users/${GITHUB_USER}/repos?per_page=100&sort=pushed&type=owner`
          );
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const repos = await res.json();

          // Merge local projects that aren't already in GitHub response
          const githubNames = new Set(repos.map((r) => r.name.toLowerCase()));
          const extras = LOCAL_PROJECTS.filter(
            (p) => !githubNames.has(p.name.toLowerCase())
          );

          // Sort: non-forks first, then by pushed_at
          allRepos = [...repos, ...extras]
            .filter((r) => !r.archived)
            .sort((a, b) => {
              if (a.fork !== b.fork) return a.fork ? 1 : -1;
              return new Date(b.pushed_at) - new Date(a.pushed_at);
            });

          // Build language filter buttons
          const langs = [
            ...new Set(allRepos.map((r) => r.language).filter(Boolean)),
          ].sort();
          const filtersWrap = document.querySelector(".filters-wrap");
          langs.forEach((lang) => {
            const btn = document.createElement("button");
            btn.className = "filter-btn";
            btn.dataset.lang = lang;
            btn.innerHTML = `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${langColor(lang)};margin-right:5px;vertical-align:middle"></span>${lang}`;
            filtersWrap.appendChild(btn);
          });

          // Render
          grid.innerHTML = "";
          renderGrid("all");

          // Bio from user API
          try {
            const uRes = await fetch(
              `https://api.github.com/users/${GITHUB_USER}`
            );
            const user = await uRes.json();
            if (user.bio) document.getElementById("bio").textContent = user.bio;
            if (user.name)
              document.querySelector("h1").textContent = user.name;
          } catch (_) {}
        } catch (err) {
          grid.innerHTML = `<div class="error-msg">
            <strong>Não foi possível carregar os projetos</strong>
            Verifique sua conexão ou tente novamente mais tarde.<br><br>
            <a href="https://github.com/${GITHUB_USER}" target="_blank" rel="noopener"
               style="color:var(--accent)">Ver perfil no GitHub</a>
          </div>`;
        }
      }

      // Filter button clicks (delegated)
      document
        .querySelector(".filters-wrap")
        .addEventListener("click", (e) => {
          const btn = e.target.closest(".filter-btn");
          if (!btn) return;
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          renderGrid(btn.dataset.lang);
        });

      // Demo button clicks (delegated) — stop the card <a> from navigating and
      // open the live demo URL instead.
      document.getElementById("grid").addEventListener("click", (e) => {
        const btn = e.target.closest(".card-demo-btn");
        if (!btn) return;
        e.preventDefault();
        e.stopPropagation();
        const url = btn.dataset.demo;
        if (url) window.open(url, "_blank", "noopener");
      });
      document.getElementById("grid").addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;
        const btn = e.target.closest(".card-demo-btn");
        if (!btn) return;
        e.preventDefault();
        e.stopPropagation();
        const url = btn.dataset.demo;
        if (url) window.open(url, "_blank", "noopener");
      });

      loadRepos();
    </script>
  </body>
</html>
